name: Fetch Cas9 Sequences

on:
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Install Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: pip install biopython

    - name: Run script
      run: python fetch_ncbi_cas9.py
      
    - name: Merge batches
      run: cat cas9_batch_*.fasta > cas9_all_raw.fasta

    - name: Deduplicate
      run: python deduplicate.py
      
    - name: Install CD-HIT
      run: sudo apt-get update && sudo apt-get install -y cd-hit

    - name: Cluster sequences (90% identity)
      run: cd-hit -i cas9_deduplicated.fasta -o cas9_clustered.fasta -c 0.9 -n 5
      
    - name: Install BLAST
      run: sudo apt-get update && sudo apt-get install -y ncbi-blast+

    - name: Prepare database
      run: makeblastdb -in cas9_clustered.fasta -dbtype prot

    - name: Run BLAST (FnCas9 vs dataset with organism)
      run: |
        blastp -query fncas9_reference.fasta \
           -db cas9_clustered.fasta \
           -out fncas9_hits_with_org.txt \
           -outfmt "6 sseqid pident length evalue stitle"
 
    - name: Count clustered sequences
      run: grep -c ">" cas9_clustered.fasta
      
    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: cas9_sequences
        path: |
         *.fasta
         *.txt
