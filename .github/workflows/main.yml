name: Fetch Cas9 Sequences

on:
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Install Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: pip install biopython

    - name: Run script
      run: python fetch_ncbi_cas9.py
      
    - name: Merge batches
      run: cat cas9_batch_*.fasta > cas9_all_raw.fasta

    - name: Deduplicate
      run: python deduplicate.py
      
    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: cas9_sequences
        path: |
         *.fasta
